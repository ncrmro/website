name: Deploy

on:
  push:
    branches: [main]
    paths:
      - 'astro/**'
      - 'drizzle/**'
      - 'package-lock.json'
      - '.github/workflows/deploy.yml'
      - '.github/actions/cloudflare-deploy/**'
  workflow_dispatch:

concurrency:
  group: production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Drizzle migrations against the Turso database. Idempotent, so
      # we run on every push even when only astro/ changed — cheap, and
      # keeps the migration path warm in case schema work returns.
      - name: Setup Node.js (root)
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install root dependencies
        run: npm ci

      - name: Run database migrations
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
        run: npm run db:migrate

      - name: Deploy Astro to Cloudflare
        uses: ./.github/actions/cloudflare-deploy
        with:
          mode: deploy
          cloudflare-api-token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          cloudflare-account-id: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
