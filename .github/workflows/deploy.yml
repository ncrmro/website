name: Deploy

on:
  push:
    branches: [main]
    paths:
      - 'code/web/src/**'
      - 'code/web/public/**'
      - 'code/web/db/**'
      - 'code/web/drizzle/**'
      - 'code/web/package.json'
      - 'code/web/bun.lock'
      - 'code/web/astro.config.mjs'
      - 'code/web/wrangler.jsonc'
      - 'code/web/drizzle.config.ts'
      - '.github/workflows/deploy.yml'
      - '.github/actions/cloudflare-deploy/**'
  workflow_dispatch:

concurrency:
  group: production
  cancel-in-progress: false

defaults:
  run:
    working-directory: code/web

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Post media is Git-LFS tracked; without this the build
          # ships pointer text files instead of images.
          lfs: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache bun install
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('code/web/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Drizzle migrations against the Turso database. The DB is inert
      # scaffolding today (no live client reads it), so this step is
      # allowed to fail without blocking the deploy — keeps the wiring
      # in place for when schema work returns. Re-validate the step
      # when the DB is revived.
      - name: Run database migrations
        continue-on-error: true
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
        run: bun run db:migrate

      - name: Deploy Astro to Cloudflare
        uses: ./.github/actions/cloudflare-deploy
        with:
          mode: deploy
          # Job already ran Setup Node + bun + `bun install` for the
          # migration step above. Avoid doing it twice.
          skip-setup: 'true'
          working-directory: code/web
          cloudflare-api-token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          cloudflare-account-id: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
